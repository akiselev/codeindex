name: Agent fixup

on:
  pull_request:

permissions:
  contents: write

jobs:
  fixup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply known compiler fixes and format
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          sqlite = Path("crates/sqlite/src/lib.rs")
          text = sqlite.read_text()
          text = text.replace("pub struct Db {\n", "#[derive(Debug)]\npub struct Db {\n", 1)
          old = '''    pub fn list_units_for_file(&self, file_id: FileId) -> Result<Vec<CodeUnit>> {
                  self.list_units_query(
                      "SELECT id, file_id, entity_id, entity_version_id, generation,
                              language_id, kind, name, scope, start_byte, end_byte,
                              start_line, end_line, body_node_count, source_hash, normalized_body_hash
                       FROM code_units WHERE file_id = ?1 ORDER BY start_byte",
                      [file_id],
                  )
              }

              pub fn list_units_for_project(&self, project_id: ProjectId) -> Result<Vec<CodeUnit>> {
                  self.list_units_query(
                      "SELECT u.id, u.file_id, u.entity_id, u.entity_version_id, u.generation,
                              u.language_id, u.kind, u.name, u.scope, u.start_byte, u.end_byte,
                              u.start_line, u.end_line, u.body_node_count, u.source_hash,
                              u.normalized_body_hash
                       FROM code_units u JOIN files f ON f.id = u.file_id
                       WHERE f.project_id = ?1 ORDER BY u.id",
                      [project_id],
                  )
              }

              fn list_units_query<const N: usize>(
                  &self,
                  sql: &str,
                  params: [i64; N],
              ) -> Result<Vec<CodeUnit>> {
                  let mut stmt = self.conn.prepare(sql)?;
                  Ok(stmt
                      .query_map(params, row_to_unit)?
                      .collect::<rusqlite::Result<Vec<_>>>()?)
              }
          '''
          new = '''    pub fn list_units_for_file(&self, file_id: FileId) -> Result<Vec<CodeUnit>> {
                  let mut stmt = self.conn.prepare(
                      "SELECT id, file_id, entity_id, entity_version_id, generation,
                              language_id, kind, name, scope, start_byte, end_byte,
                              start_line, end_line, body_node_count, source_hash, normalized_body_hash
                       FROM code_units WHERE file_id = ?1 ORDER BY start_byte",
                  )?;
                  Ok(stmt
                      .query_map([file_id], row_to_unit)?
                      .collect::<rusqlite::Result<Vec<_>>>()?)
              }

              pub fn list_units_for_project(&self, project_id: ProjectId) -> Result<Vec<CodeUnit>> {
                  let mut stmt = self.conn.prepare(
                      "SELECT u.id, u.file_id, u.entity_id, u.entity_version_id, u.generation,
                              u.language_id, u.kind, u.name, u.scope, u.start_byte, u.end_byte,
                              u.start_line, u.end_line, u.body_node_count, u.source_hash,
                              u.normalized_body_hash
                       FROM code_units u JOIN files f ON f.id = u.file_id
                       WHERE f.project_id = ?1 ORDER BY u.id",
                  )?;
                  Ok(stmt
                      .query_map([project_id], row_to_unit)?
                      .collect::<rusqlite::Result<Vec<_>>>()?)
              }
          '''
          if old not in text:
              raise SystemExit("expected sqlite unit-query block not found")
          sqlite.write_text(text.replace(old, new))

          indexer = Path("crates/indexer/src/lib.rs")
          text = indexer.read_text()
          text = text.replace(
              "FileSystemSource::new(&project.source_dir)",
              "FileSystemSource::new(project.source_dir.clone())",
          )
          text = text.replace(
              "matches!(\n                representation.origin,",
              "matches!(\n                &representation.origin,",
          )
          indexer.write_text(text)
          PY
          cargo fmt --all
      - name: Commit fixup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No fixup needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix compiler errors and format"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
