          )
          replace_once(
              "crates/indexer/src/source.rs",
              "        document_id: &str,\n        _relative_path: &str,\n        _language_id: &str,",
              "        document_id: &str,\n        revision: &str,",
          )
          replace_once(
              "crates/indexer/src/source.rs",
              "        let id = DocumentId::new(document_id);\n        let Some(document) = snapshot.document(&id)? else {\n            return Ok(None);\n        };\n        let content = match snapshot.read(&document) {",
              "        let id = DocumentId::new(document_id);\n        let content = match snapshot.read_by_id(&id, &RevisionToken::new(revision)) {",
          )

          # Recovery uses the durable cache first and only then an exact provider read.
          replace_once(
              "crates/indexer/src/embed.rs",
              "        let source = if let Some(catalog) = sources {\n            catalog.read(\n                &location.project_label,\n                &location.source_document_id,\n                &location.relative_path,\n                &location.language_id,\n            )?\n        } else {\n            let path = std::path::Path::new(&location.source_dir).join(&location.relative_path);\n            std::fs::read_to_string(path).ok()\n        };",
