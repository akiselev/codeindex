name: Source incremental and CAS fixup

on:
  pull_request:

permissions:
  contents: write

jobs:
  fixup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Implement checkpoint feeds and source CAS
        shell: bash
        run: |
          cat > /tmp/patch.py <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"pattern not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # Schema: durable provider checkpoints and content-addressed source blobs.
          replace_once(
              "crates/sqlite/src/migrations.rs",
              "/// Schema epoch. Version 1 was the pre-space M4 prototype; it is intentionally\n/// rejected rather than migrated because the project remains pre-release.\npub const SCHEMA_VERSION: i64 = 2;",
              "/// Schema epoch. Earlier pre-release layouts are intentionally rejected rather\n/// than migrated. Version 3 adds provider checkpoints and durable source blobs.\npub const SCHEMA_VERSION: i64 = 3;",
          )
          replace_once(
              "crates/sqlite/src/migrations.rs",
              "CREATE TABLE files(\n",
              "CREATE TABLE project_source_checkpoints(\n  project_id INTEGER PRIMARY KEY REFERENCES projects(id) ON DELETE CASCADE,\n  workspace_id TEXT NOT NULL,\n  checkpoint BLOB NOT NULL,\n  updated_at TEXT NOT NULL\n);\n\nCREATE TABLE files(\n",
          )
          replace_once(
              "crates/sqlite/src/migrations.rs",
              "CREATE INDEX idx_files_source_hash ON files(source_hash);\n",
              "CREATE INDEX idx_files_source_hash ON files(source_hash);\n\nCREATE TABLE source_blobs(\n  source_hash TEXT PRIMARY KEY,\n  content BLOB NOT NULL,\n  encoding_hint TEXT,\n  size INTEGER NOT NULL,\n  created_at TEXT NOT NULL\n);\n",
          )

          # SQLite API.
          replace_once(
              "crates/sqlite/src/lib.rs",
              "pub struct HashLocation {\n    pub project_label: String,\n    pub source_dir: String,\n    pub source_document_id: String,\n    pub relative_path: String,\n    pub language_id: String,\n}",
              "pub struct HashLocation {\n    pub project_label: String,\n    pub source_dir: String,\n    pub source_document_id: String,\n    pub source_revision: String,\n    pub source_hash: String,\n    pub relative_path: String,\n    pub language_id: String,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct SourceBlob {\n    pub content: Vec<u8>,\n    pub encoding_hint: Option<String>,\n}",
          )
          replace_once(
              "crates/sqlite/src/lib.rs",
              "    // ----- source documents -----\n",
              "    // ----- provider checkpoints -----\n\n    pub fn get_source_checkpoint(\n        &self,\n        project_id: ProjectId,\n    ) -> Result<Option<(String, Vec<u8>)>> {\n        Ok(self\n            .conn\n            .query_row(\n                \"SELECT workspace_id, checkpoint FROM project_source_checkpoints \\\n                 WHERE project_id = ?1\",\n                [project_id],\n                |row| Ok((row.get(0)?, row.get(1)?)),\n            )\n            .optional()?)\n    }\n\n    pub fn set_source_checkpoint(\n        &self,\n        project_id: ProjectId,\n        workspace_id: &str,\n        checkpoint: &[u8],\n    ) -> Result<()> {\n        self.conn.execute(\n            \"INSERT INTO project_source_checkpoints(\n                 project_id, workspace_id, checkpoint, updated_at)\n             VALUES (?1, ?2, ?3, datetime('now'))\n             ON CONFLICT(project_id) DO UPDATE SET\n                 workspace_id = excluded.workspace_id,\n                 checkpoint = excluded.checkpoint,\n                 updated_at = excluded.updated_at\",\n            params![project_id, workspace_id, checkpoint],\n        )?;\n        Ok(())\n    }\n\n    pub fn clear_source_checkpoint(&self, project_id: ProjectId) -> Result<()> {\n        self.conn.execute(\n            \"DELETE FROM project_source_checkpoints WHERE project_id = ?1\",\n            [project_id],\n        )?;\n        Ok(())\n    }\n\n    // ----- source documents -----\n",
          )
          replace_once(
              "crates/sqlite/src/lib.rs",
              "    // ----- units and representations -----\n",
              "    // ----- durable source cache -----\n\n    pub fn put_source_blob(\n        &self,\n        source_hash: &str,\n        content: &[u8],\n        encoding_hint: Option<&str>,\n    ) -> Result<()> {\n        if let Some(existing) = self.get_source_blob(source_hash)? {\n            anyhow::ensure!(\n                existing.content == content,\n                \"source hash collision or corrupt source blob for {source_hash}\"\n            );\n            return Ok(());\n        }\n        self.conn.execute(\n            \"INSERT INTO source_blobs(\n                 source_hash, content, encoding_hint, size, created_at)\n             VALUES (?1, ?2, ?3, ?4, datetime('now'))\",\n            params![source_hash, content, encoding_hint, content.len() as i64],\n        )?;\n        Ok(())\n    }\n\n    pub fn get_source_blob(&self, source_hash: &str) -> Result<Option<SourceBlob>> {\n        Ok(self\n            .conn\n            .query_row(\n                \"SELECT content, encoding_hint FROM source_blobs WHERE source_hash = ?1\",\n                [source_hash],\n                |row| {\n                    Ok(SourceBlob {\n                        content: row.get(0)?,\n                        encoding_hint: row.get(1)?,\n                    })\n                },\n            )\n            .optional()?)\n    }\n\n    pub fn prune_orphan_source_blobs(&self) -> Result<usize> {\n        Ok(self.conn.execute(\n            \"DELETE FROM source_blobs\n             WHERE NOT EXISTS (\n               SELECT 1 FROM files f WHERE f.source_hash = source_blobs.source_hash\n             )\",\n            [],\n        )?)\n    }\n\n    // ----- units and representations -----\n",
          )
          replace_once(
              "crates/sqlite/src/lib.rs",
              "            \"SELECT p.label, p.source_dir, f.source_document_id, f.relative_path, f.language_id\n",
              "            \"SELECT p.label, p.source_dir, f.source_document_id, f.source_revision,\n                    f.source_hash, f.relative_path, f.language_id\n",
          )
          replace_once(
              "crates/sqlite/src/lib.rs",
              "                        source_document_id: row.get(2)?,\n                        relative_path: row.get(3)?,\n                        language_id: row.get(4)?,",
              "                        source_document_id: row.get(2)?,\n                        source_revision: row.get(3)?,\n                        source_hash: row.get(4)?,\n                        relative_path: row.get(5)?,\n                        language_id: row.get(6)?,",
          )

          # Source contract: bounded complete deltas and a real in-memory feed.
          replace_once(
              "crates/source/src/lib.rs",
              "pub type ChangeIter<'a> = Box<dyn Iterator<Item = Result<SourceChange, SourceError>> + Send + 'a>;\n",
              "pub type ChangeIter<'a> = Box<dyn Iterator<Item = Result<SourceChange, SourceError>> + Send + 'a>;\n\npub struct SourceDelta<'a> {\n    pub from: SourceCheckpoint,\n    pub to: SourceCheckpoint,\n    pub changes: ChangeIter<'a>,\n}\n",
          )
          replace_once(
