          )
          replace_once(
              "crates/indexer/src/embed.rs",
              "        let Some(source) = source else { continue };\n        let def = registry",
              "        let Some(source) = source else { continue };\n        anyhow::ensure!(\n            codeindex_tree_sitter::normalizer::sha256_hex(&source) == location.source_hash,\n            \"source cache hash mismatch for {}\",\n            location.source_document_id\n        );\n        let def = registry",
          )

          # Indexer: bounded delta consumption and durable source caching.
          replace_once(
