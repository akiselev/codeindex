name: Source API diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format workspace
        run: cargo fmt --all
      - name: Capture checks
        shell: bash
        run: |
          set +e
          cargo check --workspace --all-targets > diagnostics.log 2>&1
          echo $? > diagnostics.status
          set -e
      - name: Build diagnostic bundle
        run: |
          tar --exclude=.git --exclude=target -czf source-api-diagnostics.tar.gz \
            Cargo.toml Cargo.lock crates/indexer crates/source crates/source-fs crates/codeindex \
            diagnostics.log diagnostics.status
      - uses: actions/upload-artifact@v4
        with:
          name: source-api-diagnostics
          path: source-api-diagnostics.tar.gz
