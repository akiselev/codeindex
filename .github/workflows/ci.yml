name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  source-incremental-fixup:
    name: apply source incremental and CAS implementation
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply implementation
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            if grep -q 'SCHEMA_VERSION: i64 = 3' crates/sqlite/src/migrations.rs; then
              echo 'incremental source implementation already applied'
              exit 0
            fi
            python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/source-incremental-cas-fixup.yml').read_text()
          start_marker = "          cat > /tmp/patch.py <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in lines
          ) + '\n'
          Path('/tmp/patch.py').write_text(script)
          PY
            python /tmp/patch.py
            python - <<'PY'
          from pathlib import Path

          source = Path('crates/indexer/src/source.rs')
          text = source.read_text()
          text = text.replace(
              '    DocumentId, RevisionToken, SnapshotRequest, SourceErrorKind, SourceSnapshot, SourceWorkspace,\n',
              '    DocumentId, RevisionToken, SnapshotRequest, SourceSnapshot, SourceWorkspace,\n',
              1,
          )
          text = text.replace(
              '    SourceContent, SourceError, SourceKind, SourceRootId, WorkspaceDescriptor, WorkspaceId,\n',
              '    SourceChange, SourceContent, SourceDelta, SourceError, SourceErrorKind, SourceKind,\n    SourceRootId, WorkspaceDescriptor, WorkspaceId,\n',
              1,
          )
          source.write_text(text)

          lib = Path('crates/indexer/src/lib.rs')
          text = lib.read_text()
          text = text.replace(
              '    SnapshotRequest, SourceChange, SourceCheckpoint, SourceErrorKind, SourceSnapshot,\n    SourceWorkspace,\n',
              '    SnapshotRequest, SourceSnapshot, SourceWorkspace,\n',
              1,
          )
          text = text.replace(
              '    let delta = match workspace.changes_between(&from, to, &DocumentQuery::all()) {',
              '    let query = DocumentQuery::all();\n    let delta = match workspace.changes_between(&from, to, &query) {',
              1,
          )
          lib.write_text(text)
          PY
            grep -q 'SCHEMA_VERSION: i64 = 3' crates/sqlite/src/migrations.rs
            cargo fmt --all
            cargo clippy --workspace --all-targets -- -D warnings
            cargo test --workspace
            cargo check -p codeindex --features fastembed
          ) > source-fixup.log 2>&1
          status=$?
          cat source-fixup.log
          exit $status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-incremental-fixup-diagnostics
          path: source-fixup.log
      - name: Commit implementation
        if: success()
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+users.noreply.github.com"
          git add Cargo.lock README.md TODO.md crates
          git commit -m "consume source deltas and cache source content"
          git push origin HEAD:${{ github.head_ref }}

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test + clippy (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  embedding-backend:
    name: check embedding backend (fastembed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check with fastembed
        run: cargo check -p codeindex --features fastembed
