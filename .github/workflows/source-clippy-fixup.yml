name: Source API Clippy fixup

on:
  pull_request:

permissions:
  contents: write

jobs:
  fixup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply Clippy suggestions and validate
        shell: bash
        run: |
          cargo clippy --fix --workspace --all-targets --allow-dirty --allow-staged
          cargo fmt --all
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          cargo check -p codeindex --features fastembed
      - name: Commit fixups
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates
          git commit -m "address source workspace Clippy findings"
          git push origin HEAD:${{ github.head_ref }}
